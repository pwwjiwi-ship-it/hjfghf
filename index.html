<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    max-width:1100px;
    width:100%;
    padding:20px;
}
.card{
    overflow:hidden;
    border-radius:12px;
    display:block;
}
.card img{
    width:100%;
    display:block;
    transition:.3s;
}
.card:hover img{
    transform:scale(1.05);
}
</style>
</head>
<body>

<div class="gallery">

<a class="card" href="#">
<img src="https://raw.githubusercontent.com/pwwjiwi-ship-it/hfdhf/d8e0d418fe2d23ae0d8934666da597f53aa034be/8786541152127941429.svg" alt="Video 1">
</a>

<a class="card" href="#">
<img src="https://raw.githubusercontent.com/pwwjiwi-ship-it/fhdfx/6b50dcb6376a3099c0616a6a59cee3f92b9180de/8632794159802431599.svg" alt="Video 2">
</a>

<a class="card" href="#">
<img src="https://raw.githubusercontent.com/pwwjiwi-ship-it/kfgj/6811c6d0651600344991865b35e909eb43615b12/9102086751460424422%20(1).svg" alt="Video 3">
</a>

</div>

</body>
</html>
